<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocol Yield Tracker — Yuzu</title>
<link rel="icon" href="favicon.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-card: #1c2128;
  --border: #30363d;
  --text-primary: #f0f6fc;
  --text-secondary: #8b949e;
  --accent-blue: #58a6ff;
  --accent-green: #3fb950;
  --accent-purple: #a371f7;
  --accent-orange: #d29922;
  --gradient-blue: linear-gradient(175deg, #2a5a9a 0%, #1e4a8a 5%, #244888a0 50%, #0e2a4a 100%);
  --gradient-teal: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
  --gradient-btn: linear-gradient(135deg, #1e3a5f 0%, #0d2137 100%);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
}

.container { max-width: 1400px; margin: 0 auto; padding: 24px; }

.header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 8px;
}

.home-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}

.home-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

h1 {
  font-size: 28px;
  font-weight: 700;
  background: var(--gradient-teal);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.subtitle { color: var(--text-secondary); margin-bottom: 30px; font-size: 14px; }

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 30px;
}

.card {
  background: var(--gradient-blue);
  border: 1px solid #5a8ac4;
  border-top: 1px solid rgba(140,180,230,0.4);
  border-bottom: 1px solid #1a3a6a;
  border-radius: 12px;
  padding: 20px;
  inset-shadow: 0 1px 0 rgba(200,220,255,0.25), 0 2px 2px rgba(100,160,230,0.1), 0 -2px 6px rgba(0,0,0,0.5);
  box-shadow: 0 6px 20px rgba(0,0,0,0.5), 0 1px 6px rgba(80,140,220,0.2);
  transition: transform 0.2s, box-shadow 0.2s;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}

.card-label {
  color: var(--text-secondary);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.card-value {
  font-size: 28px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

.card-value.green { color: var(--accent-green); }
.card-value.red { color: #f85149; }
.card-value.blue { color: var(--accent-blue); }
.card-value.purple { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

.card-sub { color: var(--text-secondary); font-size: 12px; margin-top: 4px; }

.proto-summary { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.proto-chip {
  padding: 6px 12px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
}
.proto-chip strong { color: var(--accent-blue); }

.filters {
  display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center;
}
.filter-group { display: flex; align-items: center; gap: 6px; }
.filter-group label { color: var(--text-secondary); font-size: 13px; }
.filter-group select, .filter-group input {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 13px;
}

.download-btn {
  margin-left: auto;
  padding: 8px 16px;
  background: var(--gradient-btn);
  border: 1px solid #2d4a6f;
  border-radius: 8px;
  color: white;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: background 0.2s, border-color 0.2s;
}
.download-btn:hover {
  background: linear-gradient(135deg, #2a4a6f 0%, #1a3a5f 100%);
  border-color: #3d6a9f;
}

.table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  background: var(--bg-secondary);
  padding: 12px 16px;
  text-align: left;
  color: var(--text-secondary);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  position: sticky;
  top: 0;
}
th:nth-child(n+9) { text-align: right; }
td { padding: 12px 16px; border-top: 1px solid #21262d; }
td:nth-child(n+9) { text-align: right; font-variant-numeric: tabular-nums; }
tr:hover td { background: var(--bg-secondary); }

.badge { padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
.badge-loop { background: #1f6feb22; color: var(--accent-blue); }
.badge-lend { background: #23863622; color: var(--accent-green); }
.badge-stake { background: #a371f722; color: #bc8cff; }
.badge-farm { background: #d2992222; color: var(--accent-orange); }
.badge-lp { background: #f8514922; color: #ff7b72; }
.badge-illiquid { background: #a371f722; color: #bc8cff; }
.badge-liquid { background: #4facfe22; color: #4facfe; }

.hf { font-weight: 600; }
.hf-safe { color: var(--accent-green); }
.hf-warn { color: var(--accent-orange); }
.hf-danger { color: #f85149; }

@media (max-width: 768px) {
  .container { padding: 16px; }
  .cards { grid-template-columns: repeat(2, 1fr); }
  .table-wrap { font-size: 12px; }
  th, td { padding: 8px 10px; }
}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <a class="home-btn" href="index.html">← Home</a>
        <img src="favicon.jpg" alt="Logo" style="width:36px;height:36px;border-radius:8px">
        <h1>Yuzu</h1>
    </div>
    <p class="subtitle">Wallet positions and yield strategies</p>

    <div class="cards" id="summaryCards"></div>
    <div class="proto-summary" id="protoSummary"></div>

    <div class="filters">
        <div class="filter-group">
            <label>Chain:</label>
            <select id="chainFilter"><option value="all">All chains</option></select>
        </div>
        <div class="filter-group">
            <label>Protocol:</label>
            <select id="protoFilter"><option value="all">All protocols</option></select>
        </div>
        <div class="filter-group">
            <label>Search:</label>
            <input type="text" id="searchFilter" placeholder="Token, wallet, or protocol...">
        </div>
        <button class="download-btn" onclick="downloadXLSX()">↓ Download XLSX</button>
    </div>

    <div class="table-wrap">
        <table id="positionsTable">
            <thead>
                <tr>
                    <th>Wallet</th>
                    <th>Chain</th>
                    <th>Protocol</th>
                    <th>Strategy</th>
                    <th>Supply Tokens</th>
                    <th>Borrow Tokens</th>
                    <th>Supply USD</th>
                    <th>Borrow USD</th>
                    <th>Net USD</th>
                    <th>Base APY</th>
                    <th>Cost APY</th>
                    <th>Net APY</th>
                    <th>Utilization</th>
                    <th>Health Factor</th>
                </tr>
            </thead>
            <tbody id="positionsBody"></tbody>
        </table>
    </div>
</div>

const positions = WHALE_DATA;
const chains = [...new Set(positions.map(p => p.chain))].sort();
const protos = [...new Set(positions.map(p => p.protocol_name))].sort();

function buildFilters() {
    const chainEl = document.getElementById('chainFilter');
    const protoEl = document.getElementById('protoFilter');
    chains.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c.toUpperCase();
        chainEl.appendChild(opt);
    });
    protos.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p; opt.textContent = p;
        protoEl.appendChild(opt);
    });
}

function fmt(n) {
    if (n === null || n === undefined) return '-';
    return '$' + n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtShort(n) {
    if (n === null || n === undefined) return '-';
    if (Math.abs(n) >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
    if (Math.abs(n) >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
    if (Math.abs(n) >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
    return '$' + n.toFixed(2);
}

function hfClass(hf) {
    if (!hf || hf === 0) return '';
    if (hf >= 1.5) return 'hf-safe';
    if (hf >= 1.1) return 'hf-warn';
    return 'hf-danger';
}

function strategyBadge(s) {
    if (!s) return '';
    const cls = { Loop: 'badge-loop', Lend: 'badge-lend', Farm: 'badge-farm', Stake: 'badge-stake', LP: 'badge-lp' }[s] || 'badge-illiquid';
    return `<span class="badge ${cls}">${s}</span>`;
}

function shortWallet(addr) {
    if (!addr) return '-';
    return addr.slice(0, 6) + '...' + addr.slice(-4);
}

function shortAddr(addr) {
    if (!addr) return '-';
    return addr.slice(0, 8) + '...';
}

function renderTable(data) {
    const body = document.getElementById('positionsBody');
    if (data.length === 0) {
        body.innerHTML = '<tr><td colspan="15" style="text-align:center;padding:40px;color:var(--text-secondary)">No positions match your filters</td></tr>';
        return;
    }
    body.innerHTML = data.map(p => {
        const supplyTokens = (p.supply || []).map(t => t.symbol).filter(Boolean).join(', ');
        const borrowTokens = (p.borrow || []).map(t => t.symbol).filter(Boolean).join(', ');
        const util = p.asset_usd > 0 ? ((Math.abs(p.debt_usd || 0) / p.asset_usd) * 100).toFixed(1) + '%' : '-';
        const hf = p.health_rate ? p.health_rate.toFixed(2) : '-';
        const baseApy = p.apy_base != null ? p.apy_base.toFixed(2) + '%' : '-';
        const costApy = p.apy_cost != null ? p.apy_cost.toFixed(2) + '%' : '-';
        const netApy = p.apy_net != null ? p.apy_net.toFixed(2) + '%' : '-';
        const netColor = p.apy_net > 0 ? 'var(--accent-green)' : p.apy_net < 0 ? '#f85149' : 'var(--text-secondary)';
        return `<tr>
            <td title="${p.wallet || ''}"><a href="https://debank.com/profile/${p.wallet}" target="_blank" style="color:var(--accent-blue);text-decoration:none">${shortWallet(p.wallet)}</a></td>
            <td>${(p.chain || '').toUpperCase()}</td>
            <td>${p.protocol_name || '-'}</td>
            <td>${strategyBadge(p.strategy)}</td>
            <td>${supplyTokens || '-'}</td>
            <td>${borrowTokens || '-'}</td>
            <td>${fmtShort(p.asset_usd)}</td>
            <td>${fmtShort(p.debt_usd)}</td>
            <td style="font-weight:600;color:var(--accent-green)">${fmtShort(p.net_usd)}</td>
            <td>${baseApy}</td>
            <td>${costApy}</td>
            <td style="font-weight:600;color:${netColor}">${netApy}</td>
            <td>${util}</td>
            <td class="${hfClass(p.health_rate)}">${hf}</td>
        </tr>`;
    }).join('');
}

function filterPositions() {
    const chain = document.getElementById('chainFilter').value;
    const proto = document.getElementById('protoFilter').value;
    const search = document.getElementById('searchFilter').value.toLowerCase().trim();

    let data = positions;
    if (chain !== 'all') data = data.filter(p => p.chain === chain);
    if (proto !== 'all') data = data.filter(p => p.protocol_name === proto);
    if (search) {
        data = data.filter(p =>
            (p.wallet || '').toLowerCase().includes(search) ||
            (p.protocol_name || '').toLowerCase().includes(search) ||
            (p.supply || []).some(t => (t.symbol || '').toLowerCase().includes(search)) ||
            (p.borrow || []).some(t => (t.symbol || '').toLowerCase().includes(search)) ||
            (p.strategy || '').toLowerCase().includes(search)
        );
    }
    return data.sort((a, b) => (b.net_usd || 0) - (a.net_usd || 0));
}

function updateSummary(data) {
    const total = data.reduce((s, p) => s + (p.net_usd || 0), 0);
    const supply = data.reduce((s, p) => s + (p.asset_usd || 0), 0);
    const borrow = data.reduce((s, p) => s + (Math.abs(p.debt_usd) || 0), 0);
    const wallets = new Set(data.map(p => p.wallet)).size;
    const avgApy = supply > 0 ? (data.reduce((s, p) => s + ((p.apy_net || 0) * (p.asset_usd || 0)), 0) / supply) : 0;
    const avgUtil = supply > 0 ? (borrow / supply * 100) : 0;

    const avgHf = positions.filter(p => p.health_rate > 0).reduce((s, p, _, arr) => s + p.health_rate / arr.length, 0);

    const chainsUsed = [...new Set(data.map(p => p.chain))].length;
    const protocolList = [...new Set(data.map(p => p.protocol_name))];
    const protosUsed = protocolList.length;
    const topProto = [...new Map(data.map(p => [p.protocol_name, (p.net_usd || 0)])).entries()]
        .sort((a, b) => b[1] - a[1])[0];
    const topChain = [...new Map(data.map(p => [p.chain, (p.net_usd || 0)])).entries()]
        .sort((a, b) => b[1] - a[1])[0];

    document.getElementById('summaryCards').innerHTML = `
        <div class="card"><div class="card-label">Total Value</div><div class="card-value green">${fmtShort(total)}</div><div class="card-sub">${data.length} positions</div></div>
        <div class="card"><div class="card-label">Net APY</div><div class="card-value blue">${avgApy.toFixed(2)}%</div><div class="card-sub">weighted avg</div></div>
        <div class="card"><div class="card-label">Utilization</div><div class="card-value">${avgUtil.toFixed(1)}%</div><div class="card-sub">${fmtShort(borrow)} borrowed</div></div>
        <div class="card"><div class="card-label">Health Factor</div><div class="card-value purple ${hfClass(avgHf)}">${avgHf.toFixed(2)}</div><div class="card-sub">${avgHf >= 1.1 ? 'Safe' : '⚠️ Below 1.1'}</div></div>
        <div class="card"><div class="card-label">Wallets</div><div class="card-value">${wallets}</div><div class="card-sub">active</div></div>
        <div class="card"><div class="card-label">Top Protocol</div><div class="card-value blue">${topProto ? topProto[0] : '-'}</div><div class="card-sub">${topProto ? fmtShort(topProto[1]) : ''}</div></div>
        <div class="card"><div class="card-label">Top Chain</div><div class="card-value blue">${topChain ? topChain[0].toUpperCase() : '-'}</div><div class="card-sub">${topChain ? fmtShort(topChain[1]) : ''}</div></div>
        <div class="card"><div class="card-label">Distribution</div><div class="card-value">${chainsUsed} chains</div><div class="card-sub">${protosUsed} protocols</div></div>
    `;

    const protoHtml = protocolList.map(p => {
        const count = data.filter(d => d.protocol_name === p).length;
        const val = data.filter(d => d.protocol_name === p).reduce((s, d) => s + (d.net_usd || 0), 0);
        return `<div class="proto-chip"><strong>${p}</strong> ${count} pos · ${fmtShort(val)}</div>`;
    }).join('');
    document.getElementById('protoSummary').innerHTML = protoHtml;
}

function downloadXLSX() {
    const rows = positions.map(p => ({
        Wallet: p.wallet,
        Chain: p.chain,
        Protocol: p.protocol_name,
        Strategy: p.strategy,
        SupplyTokens: (p.supply || []).map(t => t.symbol).join(', '),
        BorrowTokens: (p.borrow || []).map(t => t.symbol).join(', '),
        SupplyUSD: p.asset_usd,
        BorrowUSD: p.debt_usd,
        NetUSD: p.net_usd,
        BaseAPY: p.apy_base,
        CostAPY: p.apy_cost,
        NetAPY: p.apy_net,
        Utilization: p.asset_usd > 0 ? (Math.abs(p.debt_usd || 0) / p.asset_usd) : 0,
        HealthFactor: p.health_rate,
        ScanTime: p.scanned_at,
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Positions');
    ws['!cols'] = [
        { wch: 44 }, { wch: 10 }, { wch: 20 }, { wch: 10 },
        { wch: 40 }, { wch: 40 },
        { wch: 16 }, { wch: 16 }, { wch: 16 },
        { wch: 10 }, { wch: 10 }, { wch: 10 }, { wch: 10 }, { wch: 10 },
        { wch: 22 },
    ];
    XLSX.writeFile(wb, 'yuzu_positions.xlsx');
}

document.addEventListener('DOMContentLoaded', () => {
    buildFilters();
    const data = filterPositions();
    updateSummary(data);
    renderTable(data);
    document.getElementById('chainFilter').addEventListener('change', () => {
        const data = filterPositions();
        updateSummary(data);
        renderTable(data);
    });
    document.getElementById('protoFilter').addEventListener('change', () => {
        const data = filterPositions();
        updateSummary(data);
        renderTable(data);
    });
    document.getElementById('searchFilter').addEventListener('input', () => {
        const data = filterPositions();
        updateSummary(data);
        renderTable(data);
    });
});
</script>
</body>
</html>

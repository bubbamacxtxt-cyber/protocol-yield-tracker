<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocol Yield Tracker</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0e17; color: #e1e4e8; min-height: 100vh; }
.container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
h1 { font-size: 32px; margin-bottom: 8px; }
.subtitle { color: #8b949e; margin-bottom: 40px; font-size: 14px; }
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 40px; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; }
.card-label { color: #8b949e; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.card-value { font-size: 28px; font-weight: 700; color: #58a6ff; }

.whale-list { display: grid; gap: 16px; }
.whale-item { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 24px; cursor: pointer; transition: border-color 0.2s; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: inherit; }
.whale-item:hover { border-color: #58a6ff; }
.whale-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.whale-meta { color: #8b949e; font-size: 13px; }
.whale-stats { text-align: right; min-width: 120px; }
.whale-value { font-size: 22px; font-weight: 700; color: #3fb950; font-variant-numeric: tabular-nums; text-align: right; }
.whale-detail { color: #8b949e; font-size: 12px; text-align: right; }
.arrow { color: #484f58; font-size: 24px; margin-left: 16px; }

.footer { text-align: center; color: #484f58; font-size: 12px; margin-top: 60px; padding: 20px; }
</style>
</head>
<body>
<div class="container">
    <h1>📊 Protocol Yield Tracker</h1>
    <p class="subtitle">Whale position analyzer — powered by DeBank Cloud API</p>

    <div class="cards" id="summaryCards"></div>

    <h2 style="margin-bottom:20px;font-size:18px;color:#8b949e">Protocols</h2>
    <div class="whale-list" id="whaleList"></div>

    <div class="footer" id="footer"></div>
</div>

<script>
async function init() {
    console.log('Loading protocol tracker...');
    let DATA;
    try {
        const res = await fetch('data.json?v=' + Date.now());
        console.log('Fetch status:', res.status);
        DATA = await res.json();
        console.log('Data loaded:', Object.keys(DATA.whales).length, 'whales');
    } catch (e) {
        console.error('Load failed:', e);
        document.getElementById('whaleList').innerHTML = '<div style="text-align:center;padding:40px;color:#f85149">Failed to load data.json: ' + e.message + '</div>';
        return;
    }

    const whales = Object.entries(DATA.whales);
    let totalNet = 0, totalAssets = 0, totalDebt = 0, totalPositions = 0, totalWallets = 0, totalActive = 0;
    const allChains = new Set(), allProtos = new Set();

    whales.forEach(([name, w]) => {
        w.positions.forEach(p => {
            totalNet += p.net_usd;
            totalAssets += p.asset_usd;
            totalDebt += p.debt_usd;
            allChains.add(p.chain);
            allProtos.add(p.protocol_name);
        });
        totalPositions += w.positions.length;
        totalWallets += w.total_wallets || w.wallets.length;
        totalActive += w.active_wallets || w.wallets.length;
    });

    // Summary cards
    document.getElementById('summaryCards').innerHTML = `
        <div class="card"><div class="card-label">Total Value</div><div class="card-value">$${fmt(totalNet)}</div></div>
        <div class="card"><div class="card-label">Protocols</div><div class="card-value">${whales.length}</div></div>
        <div class="card"><div class="card-label">Wallets</div><div class="card-value">${totalActive}/${totalWallets}</div></div>
        <div class="card"><div class="card-label">Positions</div><div class="card-value">${totalPositions}</div></div>
        <div class="card"><div class="card-label">Chains</div><div class="card-value">${allChains.size}</div></div>
        <div class="card"><div class="card-label">DeFi Protocols</div><div class="card-value">${allProtos.size}</div></div>
    `;

    // Whale list
    const listHtml = whales.map(([name, w]) => {
        const net = w.positions.reduce((s, p) => s + p.net_usd, 0);
        const chains = [...new Set(w.positions.map(p => p.chain))];
        const protos = [...new Set(w.positions.map(p => p.protocol_name))];
        const slug = name.toLowerCase().replace(/[^a-z0-9]/g, '-');
        return `
            <a class="whale-item" href="${slug}.html">
                <div>
                    <div class="whale-name">${name}</div>
                    <div class="whale-meta">${w.active_wallets || w.wallets.length}/${w.total_wallets || w.wallets.length} wallets active · ${w.positions.length} positions · ${chains.join(', ')} · ${protos.join(', ')}</div>
                </div>
                <div class="whale-stats">
                    <div class="whale-value">$${fmt(net)}</div>
                    <div class="whale-detail">net value</div>
                </div>
                <div class="arrow">→</div>
            </a>
        `;
    }).join('');
    document.getElementById('whaleList').innerHTML = listHtml || '<div style="text-align:center;padding:40px;color:#8b949e">No protocols loaded yet.</div>';

    // Footer
    document.getElementById('footer').innerHTML = `Generated ${new Date(DATA.generated_at).toLocaleString()} · ${DATA.token_registry_count} tokens in registry`;
}

function fmt(n) {
    if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
    if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n/1e3).toFixed(0) + 'K';
    return n.toLocaleString(undefined, {maximumFractionDigits: 0});
}

init();
</script>
</body>
</html>

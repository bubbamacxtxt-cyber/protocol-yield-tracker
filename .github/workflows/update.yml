name: Update Whale Data

on:
  schedule:
    - cron: '0 10 * * *'  # 10:00 UTC daily
  workflow_dispatch:  # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # DeBank-powered whales: Avant, yoUSD, Yuzu, Reservoir, Makina, Upshift, Midas, Superform
      - name: Scan DeBank wallets
        run: node src/fetch.js
        env:
          DEBANK_API_KEY: ${{ secrets.DEBANK_API_KEY }}

      # API/On-chain whales
      - name: Fetch InfiniFi data
        run: node src/fetch-infinifi.js

      - name: Fetch Anzen data
        run: node src/fetch-anzen.js

      - name: Fetch Pareto data
        run: node src/fetch-pareto.js

      - name: Export to data.json
        run: node src/export.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git status
          git add data/whales/ data/manual-positions.json data.json yield-tracker.db
          git diff --staged --stat
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git pull --rebase origin main
            git commit -m "Auto-update whale data $(date -u +%Y-%m-%d)"
            git push origin main
          fi

name: Update Whale Data

on:
  schedule:
    - cron: '0 10 * * *'  # 10:00 UTC daily
  workflow_dispatch:  # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # DeBank-powered whales: Avant, yoUSD, Yuzu, Reservoir, Makina, Upshift, Midas, Superform
      - name: Scan DeBank wallets
        run: node src/fetch.js
        env:
          DEBANK_API_KEY: ${{ secrets.DEBANK_API_KEY }}

      # API/On-chain whales
      - name: Fetch InfiniFi data
        run: node src/fetch-infinifi.js

      - name: Fetch Anzen data
        run: node src/fetch-anzen.js

      - name: Fetch Pareto data
        run: node src/fetch-pareto.js

      - name: Export to data.json
        run: node src/export.js

      - name: Debug git state
        run: |
          echo "Remote URL:"
          git remote -v
          echo "Status:"
          git status
          echo "Diff staged:"
          git diff --staged --stat || echo "No staged changes"

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update whale data ${{ github.run_number }}"
          file_pattern: data/whales/ data/manual-positions.json data.json yield-tracker.db
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

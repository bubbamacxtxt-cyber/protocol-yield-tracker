name: Deploy to Netlify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Netlify deploy
        env:
          NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
        run: |
          if [ -z "$NETLIFY_BUILD_HOOK_URL" ]; then
            echo "::error::NETLIFY_BUILD_HOOK_URL secret not set — see CLAUDE.md / repo settings"
            exit 1
          fi
          curl -sS -X POST "$NETLIFY_BUILD_HOOK_URL" -d '{}'

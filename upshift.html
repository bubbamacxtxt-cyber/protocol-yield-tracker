<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocol Yield Tracker — Upshift</title>
<link rel="icon" href="favicon.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-card: #1c2128;
  --border: #30363d;
  --text-primary: #f0f6fc;
  --text-secondary: #8b949e;
  --accent-blue: #58a6ff;
  --accent-green: #3fb950;
  --accent-purple: #a371f7;
  --accent-orange: #d29922;
  --gradient-blue: linear-gradient(175deg, #2a5a9a 0%, #1e4a8a 5%, #244888a0 50%, #0e2a4a 100%);
  --gradient-teal: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
  --gradient-btn: linear-gradient(135deg, #1e3a5f 0%, #0d2137 100%);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
}

.container { max-width: 1400px; margin: 0 auto; padding: 24px; }

.header { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }

.home-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 14px; background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text-secondary); text-decoration: none;
  font-size: 13px; cursor: pointer; transition: all 0.2s;
}
.home-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

h1 {
  font-size: 28px; font-weight: 700;
  background: var(--gradient-teal); -webkit-background-clip: text;
  -webkit-text-fill-color: transparent; background-clip: text;
}
.subtitle { color: var(--text-secondary); margin-bottom: 30px; font-size: 14px; }

.cards {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px; margin-bottom: 30px;
}
.card {
  background: var(--gradient-blue); border: 1px solid #5a8ac4;
  border-top: 1px solid rgba(140,180,230,0.4); border-bottom: 1px solid #1a3a6a;
  border-radius: 12px; padding: 20px;
  inset-shadow: 0 1px 0 rgba(200,220,255,0.25), 0 2px 2px rgba(100,160,230,0.1), 0 -2px 6px rgba(0,0,0,0.5);
  box-shadow: 0 6px 20px rgba(0,0,0,0.5), 0 1px 6px rgba(80,140,220,0.2);
  transition: transform 0.2s, box-shadow 0.2s;
}
.card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.card-label { color: var(--text-secondary); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.card-value { font-size: 28px; font-weight: 700; font-variant-numeric: tabular-nums; }
.card-value.green { color: var(--accent-green); }
.card-value.red { color: #f85149; }
.card-value.blue { color: var(--accent-blue); }
.card-value.purple { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.card-sub { color: var(--text-secondary); font-size: 12px; margin-top: 4px; }

.proto-summary { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.proto-chip { padding: 6px 12px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; }
.proto-chip strong { color: var(--accent-blue); }

.filters { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.filter-group { display: flex; align-items: center; gap: 6px; }
.filter-group label { color: var(--text-secondary); font-size: 13px; }
.filter-group select, .filter-group input {
  background: var(--bg-secondary); border: 1px solid var(--border);
  color: var(--text-primary); padding: 6px 10px; border-radius: 6px; font-size: 13px;
}
.download-btn {
  margin-left: auto; padding: 8px 16px; background: var(--gradient-btn);
  border: 1px solid #2d4a6f; border-radius: 8px; color: white; cursor: pointer;
  font-size: 13px; font-weight: 600; transition: background 0.2s, border-color 0.2s;
}
.download-btn:hover { background: linear-gradient(135deg, #2a4a6f 0%, #1a3a5f 100%); border-color: #3d6a9f; }

.table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  background: var(--bg-secondary); padding: 12px 16px; text-align: left;
  color: var(--text-secondary); font-size: 11px; text-transform: uppercase;
  letter-spacing: 1px; position: sticky; top: 0;
}
th:nth-child(n+9) { text-align: right; }
td { padding: 12px 16px; border-top: 1px solid #21262d; }
td:nth-child(n+9) { text-align: right; font-variant-numeric: tabular-nums; }
tr:hover td { background: var(--bg-secondary); }

.badge { padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
.badge-loop { background: #1f6feb22; color: var(--accent-blue); }
.badge-lend { background: #23863622; color: var(--accent-green); }
.badge-stake { background: #a371f722; color: #bc8cff; }
.vault-tab {
  padding: 8px 16px; background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text-secondary); font-size: 13px; cursor: pointer; font-family: inherit;
}
.vault-tab:hover { border-color: var(--accent-blue); color: var(--text-primary); }
.vault-tab.active { background: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }
.badge-farm { background: #d2992222; color: var(--accent-orange); }
.badge-lp { background: #f8514922; color: #ff7b72; }
.badge-illiquid { background: #a371f722; color: #bc8cff; }
.badge-liquid { background: #4facfe22; color: #4facfe; }

.hf { font-weight: 600; }
.hf-safe { color: var(--accent-green); }
.hf-warn { color: var(--accent-orange); }
.hf-danger { color: #f85149; }

@media (max-width: 768px) {
  .container { padding: 16px; }
  .cards { grid-template-columns: repeat(2, 1fr); }
  .table-wrap { font-size: 12px; }
  th, td { padding: 8px 10px; }
}
#detail-modal .modal-content { animation: slideIn 0.2s ease; }
@keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
</style>
<div id="detail-modal"></div>
</head>
<body>
<div class="container">
  <div class="header">
    <a class="home-btn" href="index.html">← Home</a>
    <img src="favicon.jpg" alt="Logo" style="width:36px;height:36px;border-radius:8px">
    <h1>Upshift</h1>
  </div>
  <p class="subtitle">Wallet positions and yield strategies</p>
  <div class="cards" id="summaryCards"></div>
  <div class="proto-summary" id="protoSummary"></div>
  <div id="vaultTabs" style="display:none;margin-bottom:16px;">
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="vault-tab active" data-vault="all" onclick="filterVault('all')">All Vaults</button>
    </div>
  </div>
  <div class="filters">
    <div class="filter-group"><label>Chain:</label><select id="chainFilter"><option value="all">All chains</option></select></div>
    <div class="filter-group"><label>Protocol:</label><select id="protoFilter"><option value="all">All protocols</option></select></div>
    <div class="filter-group"><label>Search:</label><input type="text" id="searchFilter" placeholder="Token, wallet, or protocol..."></div>
    <button class="download-btn" onclick="downloadXLSX()">&#8595; Download XLSX</button>
  </div>
  <div class="table-wrap">
    <table id="positionsTable">
      <thead><tr id="tableHeader"></tr></thead>
      <tbody id="positionsBody"></tbody>
    </table>
  </div>
</div>

// ═══════════════════════════════════════════════════════════════
// SINGLE SOURCE OF TRUTH — columns define field mappings
// Table and cards both derive from this config
// ═══════════════════════════════════════════════════════════════
const COLUMNS = [
  { key: 'wallet',     label: 'Wallet',        field: 'wallet',          render: v => '<a href="https://debank.com/profile/' + v + '" target="_blank" style="color:var(--accent-blue);text-decoration:none">' + shortWallet(v) + '</a>', sortable: true },
  { key: 'chain',      label: 'Chain',         field: 'chain',           render: v => (v || '').toUpperCase() },
  { key: 'protocol',   label: 'Protocol',      field: 'protocol_name' },
  { key: 'strategy',   label: 'Strategy',      field: 'strategy',        render: v => strategyBadge(v) },
  { key: 'supply',     label: 'Supply Tokens', field: 'protocol_name' },
  { key: 'borrow',     label: 'Borrow Tokens', field: 'borrow',          render: v => (v || []).map(t => t.symbol).filter(Boolean).join(', ') || '-' },
  { key: 'supply_usd', label: 'Supply USD',    field: 'asset_usd',       format: 'usd_short', align: 'right' },
  { key: 'borrow_usd', label: 'Borrow USD',    field: 'debt_usd',        format: 'usd_short', align: 'right' },
  { key: 'net_usd',    label: 'Net USD',       field: 'net_usd',         format: 'usd_short', align: 'right', bold: true, color: 'green' },
  { key: 'base_apy',   label: 'Base APY',      field: 'apy_base',        format: 'pct', align: 'right' },
  { key: 'bonus_apy',  label: 'Bonus APY',     field: 'bonus_total',     format: 'bonus', align: 'right', color: 'green' },
  { key: 'cost_apy',   label: 'Cost APY',      field: 'apy_cost',        format: 'pct', align: 'right' },
  { key: 'net_apy',    label: 'Net APY',       field: 'apy_net',         format: 'pct', align: 'right', bold: true, color_dynamic: true },
  { key: 'util',       label: 'Utilization',   field: '_computed',       compute: p => p.asset_usd > 0 ? ((Math.abs(p.debt_usd || 0) / p.asset_usd) * 100).toFixed(1) + '%' : '-', align: 'right' },
  { key: 'health',     label: 'Health Factor',  field: 'health_rate',     render: v => v ? v.toFixed(2) : '-', compute_class: p => hfClass(p.health_rate), align: 'right' },
];

// Cards derive from same field keys as COLUMNS
const CARDS = [
  { label: 'Total Value', field: 'net_usd',    aggregate: 'sum',     format: 'usd_short', color: 'green', subtitle: d => d.length + ' positions' },
  { label: 'Net APY',     field: 'apy_net',    aggregate: 'wavg',    weight: 'asset_usd', format: 'pct', color: 'blue', subtitle: () => 'weighted avg' },
  { label: 'Utilization', field: '_computed',  aggregate: 'custom',  fn: (d) => { const s = d.reduce((a,p) => a + (p.asset_usd||0), 0); const b = d.reduce((a,p) => a + (Math.abs(p.debt_usd)||0), 0); return s > 0 ? (b/s*100).toFixed(1) + '%' : '0%'; }, subtitle: d => fmtShort(d.reduce((a,p) => a + (Math.abs(p.debt_usd)||0), 0)) + ' borrowed' },
  { label: 'Health Factor', field: 'health_rate', aggregate: 'avg', filter: p => p.health_rate > 0, format: 'num', render_class: v => hfClass(v), color: 'purple', subtitle: d => { const avg = d.filter(p => p.health_rate > 0).reduce((s,p,_,a) => s + p.health_rate / a.length, 0); return avg >= 1.1 ? 'Safe' : '⚠️ Below 1.1'; } },
  { label: 'Wallets',     field: 'wallet',     aggregate: 'count_unique', format: 'none', subtitle: () => 'active' },
  { label: 'Top Protocol', field: 'protocol',  aggregate: 'top',     sort_field: 'net_usd', format: 'label', color: 'blue', subtitle: (d, top) => top ? fmtShort(top.sum) : '' },
  { label: 'Top Chain',   field: 'chain',      aggregate: 'top',     sort_field: 'net_usd', format: 'label', color: 'blue', render: v => (v||'').toUpperCase(), subtitle: (d, top) => top ? fmtShort(top.sum) : '' },
  { label: 'Distribution', field: '_computed', aggregate: 'custom',  fn: (d) => { const chains = new Set(d.map(p => p.chain)).size; const protos = new Set(d.map(p => getFieldValue(p, COLUMNS.find(c => c.key === 'protocol')))).size; return chains + ' chains'; }, subtitle: d => { const protos = new Set(d.map(p => getFieldValue(p, COLUMNS.find(c => c.key === 'protocol')))).size; return protos + ' protocols'; } },
];

// ═══════════════════════════════════════════════════════════════
// FIELD RESOLUTION — shared by table AND cards
// ═══════════════════════════════════════════════════════════════
function getFieldValue(position, col) {
  if (col.compute) return col.compute(position);
  const val = position[col.field];
  if ((val === undefined || val === null) && col.fallback) return position[col.fallback];
  return val;
}

function resolveFieldKey(key) {
  return COLUMNS.find(c => c.key === key);
}

// FORMATTERS — shared by table and cards

function fmt(n) {
  if (n === null || n === undefined) return '-';
  return '$' + n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtShort(n) {
  if (n === null || n === undefined) return '-';
  if (Math.abs(n) >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
  if (Math.abs(n) >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
  if (Math.abs(n) >= 1e3) return '$' + (n / 1e3).toFixed(1) + 'K';
  return '$' + n.toFixed(2);
}

function formatValue(val, format, render) {
  if (render) return render(val);
  switch (format) {
    case 'usd_short': return fmtShort(val);
    case 'usd': return fmt(val);
    case 'pct': return val != null ? val.toFixed(2) + '%' : '-';
    case 'bonus': return val > 0 ? '+' + val.toFixed(2) + '%' : '';
    case 'num': return val != null ? val.toFixed(2) : '-';
    default: return val ?? '-';
  }
}

function hfClass(hf) {
  if (!hf || hf === 0) return '';
  if (hf >= 1.5) return 'hf-safe';
  if (hf >= 1.1) return 'hf-warn';
  return 'hf-danger';
}

function strategyBadge(s) {
  if (!s) return '';
  const cls = { Loop: 'badge-loop', Lend: 'badge-lend', Farm: 'badge-farm', Stake: 'badge-stake', LP: 'badge-lp' }[s] || 'badge-illiquid';
  return '<span class="badge ' + cls + '">' + s + '</span>';
}

function shortWallet(addr) {
  if (!addr) return '-';
  return addr.slice(0, 6) + '...' + addr.slice(-4);
}

// ═══════════════════════════════════════════════════════════════
// RENDER TABLE — driven entirely by COLUMNS config
// ═══════════════════════════════════════════════════════════════
function renderTable(data) {
  const header = document.getElementById('tableHeader');
  header.innerHTML = COLUMNS.map(c => '<th>' + c.label + '</th>').join('');

  const body = document.getElementById('positionsBody');
  if (data.length === 0) {
    body.innerHTML = '<tr><td colspan="' + COLUMNS.length + '" style="text-align:center;padding:40px;color:var(--text-secondary)">No positions match your filters</td></tr>';
    return;
  }

  body.innerHTML = data.map(p => {
    const cells = COLUMNS.map(c => {
      const val = getFieldValue(p, c);
      const display = formatValue(val, c.format, c.render);
      const style = [];
      if (c.bold) style.push('font-weight:600');
      if (c.color === 'green') style.push('color:var(--accent-green)');
      if (c.color === 'blue') style.push('color:var(--accent-blue)');
      if (c.color_dynamic) {
        const nc = val > 0 ? 'var(--accent-green)' : val < 0 ? '#f85149' : 'var(--text-secondary)';
        style.push('color:' + nc);
      }
      if (c.compute_class) style.push(c.compute_class(p));
      const align = c.align === 'right' ? 'text-align:right' : '';
      return '<td style="' + style.join(';') + ';' + align + '">' + display + '</td>';
    }).join('');

    const detailData = JSON.stringify(p).replace(/"/g, '&quot;').replace(/</g, '\u003c');
    return '<tr onclick="showDetail(' + detailData + ')" style="cursor:pointer">' + cells + '</tr>';
  }).join('');
}

// ═══════════════════════════════════════════════════════════════
// RENDER CARDS — derived from same field keys as COLUMNS
// ═══════════════════════════════════════════════════════════════
function renderCards(data) {
  const cardsHtml = CARDS.map(card => {
    let value, subtitle, topEntry = null;
    if (card.aggregate === 'custom') {
      value = card.fn(data);
      subtitle = card.subtitle(data);
    } else if (card.aggregate === 'sum') {
      value = data.reduce((s, p) => s + (p[card.field] || 0), 0);
      subtitle = card.subtitle(data);
    } else if (card.aggregate === 'wavg') {
      const wf = card.weight;
      const tw = data.reduce((s, p) => s + (p[wf] || 0), 0);
      value = tw > 0 ? data.reduce((s, p) => s + ((p[card.field] || 0) * (p[wf] || 0)), 0) / tw : 0;
      subtitle = card.subtitle(data);
    } else if (card.aggregate === 'avg') {
      const filtered = card.filter ? data.filter(card.filter) : data;
      value = filtered.length > 0 ? filtered.reduce((s, p) => s + (p[card.field] || 0), 0) / filtered.length : 0;
      subtitle = card.subtitle(filtered.length > 0 ? filtered : data);
    } else if (card.aggregate === 'count_unique') {
      value = new Set(data.map(p => p[card.field])).size;
      subtitle = card.subtitle(data);
    } else if (card.aggregate === 'top') {
      const col = resolveFieldKey(card.field);
      const grouped = new Map();
      data.forEach(p => {
        const k = getFieldValue(p, col);
        grouped.set(k, (grouped.get(k) || 0) + (p[card.sort_field] || 0));
      });
      const sorted = [...grouped.entries()].sort((a, b) => b[1] - a[1]);
      topEntry = sorted[0];
      value = topEntry ? (card.render ? card.render(topEntry[0]) : topEntry[0]) : '-';
      subtitle = card.subtitle(data, topEntry ? { key: topEntry[0], sum: topEntry[1] } : null);
    }

    let display;
    if (card.aggregate === 'top' && topEntry) {
      display = value;
    } else {
      display = formatValue(value, card.format, card.render);
    }

    const renderClass = card.render_class ? card.render_class(value) : '';
    const colorClass = card.color ? ' ' + card.color : '';
    const sub = typeof subtitle === 'function' ? subtitle(data) : subtitle;

    return '<div class="card">' +
      '<div class="card-label">' + card.label + '</div>' +
      '<div class="card-value' + colorClass + ' ' + renderClass + '">' + display + '</div>' +
      '<div class="card-sub">' + (sub || '') + '</div>' +
    '</div>';
  }).join('');

  document.getElementById('summaryCards').innerHTML = cardsHtml;

  const grouped = new Map();
  data.forEach(p => {
    const k = getFieldValue(p, protocolCol);
    const existing = grouped.get(k) || { count: 0, value: 0 };
    grouped.set(k, { count: existing.count + 1, value: existing.value + (p.net_usd || 0) });
  });
  const protoHtml = [...grouped.entries()].map(([name, { count, value }]) =>
    '<div class="proto-chip"><strong>' + name + '</strong> ' + count + ' pos · ' + fmtShort(value) + '</div>'
  ).join('');
  document.getElementById('protoSummary').innerHTML = protoHtml;
}

// ═══════════════════════════════════════════════════════════════
// FILTERS & EVENTS
// ═══════════════════════════════════════════════════════════════
function buildFilters() {
  const chainEl = document.getElementById('chainFilter');
  const protoEl = document.getElementById('protoFilter');
  chains.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c.toUpperCase();
    chainEl.appendChild(opt);
  });
  protos.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p; opt.textContent = p;
    protoEl.appendChild(opt);
  });
}

function filterPositions() {
  const chain = document.getElementById('chainFilter').value;
  const proto = document.getElementById('protoFilter').value;
  const search = document.getElementById('searchFilter').value.toLowerCase().trim();

  let data = positions;
  if (chain !== 'all') data = data.filter(p => p.chain === chain);
  if (proto !== 'all') data = data.filter(p => getFieldValue(p, protocolCol) === proto);
  if (search) {
    data = data.filter(p =>
      (p.wallet || '').toLowerCase().includes(search) ||
      getFieldValue(p, protocolCol).toLowerCase().includes(search) ||
      (p.protocol_name || '').toLowerCase().includes(search) ||
      (p.borrow || []).some(t => (t.symbol || '').toLowerCase().includes(search)) ||
      (p.strategy || '').toLowerCase().includes(search)
    );
  }
  return data.sort((a, b) => (b.net_usd || 0) - (a.net_usd || 0));
}

function updateView() {
  const data = filterPositions();
  renderCards(data);
  renderTable(data);
}

// ═══════════════════════════════════════════════════════════════
// XLSX EXPORT
// ═══════════════════════════════════════════════════════════════
function downloadXLSX() {
  const rows = positions.map(p => ({
    Wallet: p.wallet,
    Chain: p.chain,
    Protocol: getFieldValue(p, protocolCol),
    Strategy: p.strategy,
    SupplyTokens: (p.supply || []).map(t => t.symbol).join(', '),
    BorrowTokens: (p.borrow || []).map(t => t.symbol).join(', '),
    SupplyUSD: p.asset_usd,
    BorrowUSD: p.debt_usd,
    NetUSD: p.net_usd,
    BaseAPY: p.apy_base,
    BonusSupply: p.bonus_supply,
    BonusBorrow: p.bonus_borrow,
    CostAPY: p.apy_cost,
    NetAPY: p.apy_net,
    Utilization: p.asset_usd > 0 ? (Math.abs(p.debt_usd || 0) / p.asset_usd) : 0,
    HealthFactor: p.health_rate,
    ScanTime: p.scanned_at,
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Positions');
  ws['!cols'] = [
    { wch: 44 }, { wch: 10 }, { wch: 20 }, { wch: 10 },
    { wch: 40 }, { wch: 40 },
    { wch: 16 }, { wch: 16 }, { wch: 16 },
    { wch: 10 }, { wch: 10 }, { wch: 10 }, { wch: 10 }, { wch: 10 },
    { wch: 22 },
  ];
  XLSX.writeFile(wb, 'upshift_positions.xlsx');
}

// ═══════════════════════════════════════════════════════════════
// DETAIL MODAL
// ═══════════════════════════════════════════════════════════════
function showDetail(p) {
  const modal = document.getElementById('detail-modal');
  if (!modal) return;

  let supplyDetail = (p.supply || []).map(t => {
    let info = t.symbol + ': ' + (t.apy_base || 0).toFixed(2) + '% base';
    if (t.bonus_supply_apy) info += ' + ' + (t.bonus_supply_apy).toFixed(2) + '%';
    return info;
  }).join('<br>');

  let borrowDetail = (p.borrow || []).map(t => {
    let info = t.symbol + ': ' + (t.apy_base || 0).toFixed(2) + '% cost';
    if (t.bonus_borrow_apy) info += ' \u2212 ' + (t.bonus_borrow_apy).toFixed(2) + '%';
    return info;
  }).join('<br>');

  modal.innerHTML =
    '<div style="background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:600px;margin:50px auto">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">' +
      '<h3 style="margin:0">' + getFieldValue(p, protocolCol) + ' \u2014 ' + (p.supply ? p.supply.map(t => t.symbol).join('/') : (p.symbol || '')) + '</h3>' +
      '<button onclick="document.getElementById('detail-modal').style.display='none'" style="background:none;border:none;color:var(--text-secondary);font-size:20px;cursor:pointer;">\u00d7</button>' +
    '</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">' +
      '<div><div style="color:var(--text-secondary);font-size:12px">Supply</div><div style="font-size:13px">' + (supplyDetail || '-') + '</div></div>' +
      '<div><div style="color:var(--text-secondary);font-size:12px">Borrow</div><div style="font-size:13px">' + (borrowDetail || '-') + '</div></div>' +
    '</div>' +
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;text-align:center">' +
      '<div><div style="color:var(--text-secondary);font-size:12px">Base APY</div><div style="font-size:18px;font-weight:600">' + (p.apy_base || 0).toFixed(2) + '%</div></div>' +
      '<div><div style="color:var(--text-secondary);font-size:12px">Bonus Supply</div><div style="font-size:18px;font-weight:600;color:var(--accent-green)">+' + (p.bonus_supply || 0).toFixed(2) + '%</div></div>' +
      '<div><div style="color:var(--text-secondary);font-size:12px">Cost APY</div><div style="font-size:18px;font-weight:600">' + (p.apy_cost || 0).toFixed(2) + '%</div></div>' +
      '<div><div style="color:var(--text-secondary);font-size:12px">Bonus Borrow</div><div style="font-size:18px;font-weight:600;color:var(--accent-green)">\u2212' + (p.bonus_borrow || 0).toFixed(2) + '%</div></div>' +
    '</div>' +
    '<div style="text-align:center;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">' +
      '<div style="color:var(--text-secondary);font-size:12px">Net APY</div>' +
      '<div style="font-size:28px;font-weight:700;color:' + ((p.apy_net || 0) > 0 ? 'var(--accent-green)' : '#f85149') + '">' + (p.apy_net || 0).toFixed(2) + '%</div>' +
    '</div></div>';
  modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:1000;display:flex;align-items:start;justify-content:center;background:rgba(0,0,0,0.7)';
  modal.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  buildFilters();
  updateView();
  ['chainFilter', 'protoFilter', 'searchFilter'].forEach(id => {
    document.getElementById(id).addEventListener('input', updateView);
    document.getElementById(id).addEventListener('change', updateView);
  });
});
</script>

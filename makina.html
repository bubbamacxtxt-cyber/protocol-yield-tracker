<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protocol Yield Tracker — Makina</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0e17; color: #e1e4e8; min-height: 100vh; overflow-x: hidden; }
.container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
.header { display: flex; align-items: center; gap: 16px; margin-bottom: 5px; }
.home-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; background: #161b22; border: 1px solid #30363d; border-radius: 8px; color: #8b949e; text-decoration: none; font-size: 13px; cursor: pointer; }
.home-btn:hover { border-color: #58a6ff; color: #58a6ff; }
h1 { font-size: 32px; }
.subtitle { color: #8b949e; margin-bottom: 40px; font-size: 14px; }
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 40px; }
.card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; }
.card-label { color: #8b949e; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.card-value { font-size: 28px; font-weight: 700; color: #58a6ff; font-variant-numeric: tabular-nums; }
.whale-list { display: grid; gap: 16px; }
.whale-item { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 24px; cursor: pointer; transition: border-color 0.2s; display: grid; grid-template-columns: 1fr auto 24px; align-items: center; text-decoration: none; color: inherit; gap: 16px; min-width: 0; }
.whale-item:hover { border-color: #58a6ff; }
.whale-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.whale-meta { color: #8b949e; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.whale-stats { text-align: right; }
.whale-value { font-size: 22px; font-weight: 700; color: #3fb950; font-variant-numeric: tabular-nums; }
.whale-detail { color: #8b949e; font-size: 12px; }
.arrow { color: #484f58; font-size: 24px; text-align: center; }
.footer { text-align: center; color: #484f58; font-size: 12px; margin-top: 60px; padding: 20px; }
</style>
<link rel="icon" href="favicon.jpg">
</head>
<body>
<div class="container">
    <div class="header">
        <a class="home-btn" href="index.html">← Home</a>
        <div style="display:flex;align-items:center;gap:12px"><a class="home-btn" href="index.html">← Home</a><img src="favicon.jpg" alt="Logo" style="width:32px;height:32px;border-radius:8px"><h1>Makina</h1></div>
    </div>
    <p class="subtitle">Vaults and yield strategies</p>

    <div class="cards" id="summaryCards"></div>
    <h2 style="margin-bottom:20px;font-size:18px;color:#8b949e">Vaults</h2>
    <div class="whale-list" id="vaultList"></div>
    <div class="footer" id="footer"></div>
</div>

<script>
async function init() {
    let DATA;
    try {
        const res = await fetch('data.json?v=' + Date.now());
        DATA = await res.json();
    } catch (e) {
        document.getElementById('vaultList').innerHTML = '<div style="text-align:center;padding:40px;color:#f85149">Failed to load data.json.</div>';
        return;
    }

    const whale = DATA.whales['Makina'];
    if (!whale || !whale.vaults) {
        document.getElementById('vaultList').innerHTML = '<div style="text-align:center;padding:40px;color:#8b949e">No vaults found.</div>';
        return;
    }

    const vaults = Object.entries(whale.vaults);
    let totalNet = 0, totalPositions = 0;

    vaults.forEach(([name, v]) => {
        v.positions.forEach(p => { totalNet += p.net_usd; });
        totalPositions += v.positions.length;
    });

    // Summary cards
    document.getElementById('summaryCards').innerHTML = `
        <div class="card"><div class="card-label">Total Value</div><div class="card-value">$${fmt(totalNet)}</div></div>
        <div class="card"><div class="card-label">Vaults</div><div class="card-value">${vaults.length}</div></div>
        <div class="card"><div class="card-label">Wallets</div><div class="card-value">${whale.active_wallets}/${whale.total_wallets}</div></div>
        <div class="card"><div class="card-label">Positions</div><div class="card-value">${totalPositions}</div></div>
    `;

    // Vault list
    const listHtml = vaults.map(([name, v]) => {
        const net = v.positions.reduce((s, p) => s + p.net_usd, 0);
        const slug = v.slug || name.toLowerCase().replace(/[^a-z0-9]/g, '-');
        return `
            <a class="whale-item" href="makina/${slug}.html">
                <div>
                    <div class="whale-name">${name}</div>
                    <div class="whale-meta">${v.active_wallets}/${v.total_wallets} wallets active · ${v.positions.length} positions</div>
                </div>
                <div class="whale-stats">
                    <div class="whale-value">$${fmt(net)}</div>
                    <div class="whale-detail">net value</div>
                </div>
                <div class="arrow">→</div>
            </a>
        `;
    }).join('');
    document.getElementById('vaultList').innerHTML = listHtml;

    document.getElementById('footer').innerHTML = `Generated ${new Date(DATA.generated_at).toLocaleString()}`;
}

function fmt(n) {
    if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
    if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n/1e3).toFixed(0) + 'K';
    return n.toLocaleString(undefined, {maximumFractionDigits: 0});
}

init();
</script>
</body>
</html>
